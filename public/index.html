<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>光伏储能数据采集云平台</title>
<script src="https://unpkg.com/mqtt@5.10.1/dist/mqtt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
  :root {
    --bg: #0a0e27; --card: #111640; --border: #1e2358; --accent: #00d4aa;
    --vclr: #f7b731; --cclr: #45aaf2; --pclr: #fc5c65; --tclr: #fd9644; --lclr: #fed330;
    --text: #c8d6e5; --sub: #8395a7;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif; min-height: 100vh; }
  .header { text-align: center; padding: 16px; border-bottom: 1px solid var(--border); }
  .header h1 { font-size: 24px; letter-spacing: 2px; }
  .header h1 span { color: var(--accent); }
  .header .sub { color: var(--sub); font-size: 12px; margin-top: 4px; }
  .status { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 11px; margin-left: 8px; }
  .status.online { background: rgba(0,212,170,0.15); color: var(--accent); }
  .status.offline { background: rgba(252,92,101,0.15); color: var(--pclr); }
  .container { max-width: 1200px; margin: 0 auto; padding: 12px; }

  /* 数据卡片 */
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 12px; margin-bottom: 12px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px; text-align: center; }
  .card .label { font-size: 12px; color: var(--sub); margin-bottom: 6px; }
  .card .value { font-size: 32px; font-weight: 700; }
  .card .unit { font-size: 12px; color: var(--sub); margin-left: 2px; }

  /* 工具栏 */
  .toolbar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; padding: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; }
  .toolbar select, .toolbar button { padding: 8px 16px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); cursor: pointer; font-size: 13px; }
  .toolbar button { background: var(--accent); color: #000; font-weight: 600; border: none; }
  .toolbar button:hover { opacity: 0.85; }
  .toolbar button.secondary { background: transparent; border: 1px solid var(--border); color: var(--accent); }
  .toolbar span { color: var(--sub); font-size: 12px; }

  /* 图表 */
  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .chart-box { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px; }
  .chart-box .chart-title { font-size: 13px; color: var(--sub); margin-bottom: 6px; }
  .chart { width: 100%; height: 260px; }

  /* 统计卡片 */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); gap: 10px; margin-bottom: 12px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; text-align: center; }
  .stat-card .sval { font-size: 22px; font-weight: 700; color: var(--accent); }
  .stat-card .slbl { font-size: 11px; color: var(--sub); }

  .footer { text-align: center; color: var(--sub); font-size: 10px; opacity: 0.5; padding: 8px; }

  @media (max-width: 768px) { .charts-row { grid-template-columns: 1fr; } .chart { height: 200px; } }
</style>
</head>
<body>

<div class="header">
  <h1>☀️ 光伏储能<span>数据采集云平台</span><span class="status" id="status">● 等待连接</span></h1>
  <div class="sub">ESP8266 → MQTT → 云端存储 | 实时监控 + 历史回溯</div>
</div>

<div class="container">
  <!-- 实时数据卡片 -->
  <div class="grid">
    <div class="card"><div class="label">⚡ 光伏电压</div><div class="value" style="color:var(--vclr)" id="val_v">--</div><div class="unit">V</div></div>
    <div class="card"><div class="label">🔌 光伏电流</div><div class="value" style="color:var(--cclr)" id="val_c">--</div><div class="unit">A</div></div>
    <div class="card"><div class="label">💡 发电功率</div><div class="value" style="color:var(--pclr)" id="val_p">--</div><div class="unit">W</div></div>
    <div class="card"><div class="label">🌡️ 板面温度</div><div class="value" style="color:var(--tclr)" id="val_t">--</div><div class="unit">°C</div></div>
    <div class="card"><div class="label">☀️ 光照强度</div><div class="value" style="color:var(--lclr)" id="val_l">--</div><div class="unit">W/m²</div></div>
  </div>

  <!-- 工具栏 -->
  <div class="toolbar">
    <span>📊 历史数据：</span>
    <select id="rangeSelect" onchange="loadHistory()">
      <option value="1">最近 1 小时</option>
      <option value="6">最近 6 小时</option>
      <option value="24" selected>最近 24 小时</option>
      <option value="72">最近 3 天</option>
      <option value="168">最近 7 天</option>
    </select>
    <button onclick="loadHistory()">🔄 刷新</button>
    <button class="secondary" onclick="exportCSV()">📥 导出CSV</button>
    <span id="dataInfo"></span>
  </div>

  <!-- 统计面板 -->
  <div class="stats-grid" id="statsPanel"></div>

  <!-- 图表 -->
  <div class="charts-row">
    <div class="chart-box"><div class="chart-title">📊 电压 / 电流趋势</div><div class="chart" id="chart_vi"></div></div>
    <div class="chart-box"><div class="chart-title">📊 功率趋势</div><div class="chart" id="chart_p"></div></div>
    <div class="chart-box"><div class="chart-title">📊 温度趋势</div><div class="chart" id="chart_t"></div></div>
    <div class="chart-box"><div class="chart-title">📊 光照强度趋势</div><div class="chart" id="chart_l"></div></div>
  </div>

  <div class="footer">云平台 v1.0 | 数据自动保留 7 天</div>
</div>

<script>
// ============ ECharts 初始化 ============
function createChart(id) {
  const c = echarts.init(document.getElementById(id));
  window.addEventListener('resize', () => c.resize());
  return c;
}
const charts = {
  vi: createChart('chart_vi'),
  p:  createChart('chart_p'),
  t:  createChart('chart_t'),
  l:  createChart('chart_l'),
};

function baseOpt() {
  return {
    grid: { top: 15, right: 15, bottom: 25, left: 50 },
    tooltip: { trigger: 'axis', backgroundColor: 'rgba(17,22,64,0.95)', borderColor: '#1e2358', textStyle: { color: '#c8d6e5', fontSize: 11 } },
    xAxis: { type: 'category', data: [], axisLine: { lineStyle: { color: '#1e2358' } }, axisTick: { show: false }, axisLabel: { color: '#8395a7', fontSize: 9, rotate: 30 } },
    yAxis: { type: 'value', axisLine: { lineStyle: { color: '#1e2358' } }, splitLine: { lineStyle: { color: 'rgba(30,35,88,0.3)' } }, axisLabel: { color: '#8395a7', fontSize: 10 } },
  };
}
Object.values(charts).forEach(c => c.setOption(baseOpt()));

// ============ 实时数据 ============
const MAX_POINTS = 200;
let realtimeData = [];
let historyData = [];
let connected = false;

function setStatus(on) {
  const el = document.getElementById('status');
  connected = on;
  el.textContent = on ? '● 在线' : '● 离线';
  el.className = 'status ' + (on ? 'online' : 'offline');
}

function updateCards(d) {
  document.getElementById('val_v').textContent = d.voltage.toFixed(2);
  document.getElementById('val_c').textContent = d.current.toFixed(2);
  document.getElementById('val_p').textContent = d.power.toFixed(2);
  document.getElementById('val_t').textContent = d.temp.toFixed(1);
  document.getElementById('val_l').textContent = d.light.toFixed(1);
}

function fmtTime(ts) {
  const d = new Date(ts);
  return d.toLocaleTimeString('zh-CN', { hour12: false });
}

function updateRealtimeChart() {
  const labels = realtimeData.map(d => fmtTime(d.timestamp));
  charts.vi.setOption({
    xAxis: { data: labels },
    series: [
      { name: '电压(V)', type: 'line', data: realtimeData.map(d=>d.voltage), smooth: true, symbol: 'none', lineStyle: {color:'#f7b731',width:2}, areaStyle: {color: new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(247,183,49,0.25)'},{offset:1,color:'rgba(247,183,49,0)'}]) } },
      { name: '电流(A)', type: 'line', data: realtimeData.map(d=>d.current), smooth: true, symbol: 'none', lineStyle: {color:'#45aaf2',width:2}, areaStyle: {color: new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(69,170,242,0.25)'},{offset:1,color:'rgba(69,170,242,0)'}]) } },
    ],
  });
  charts.p.setOption({
    xAxis: { data: labels },
    series: [{ name: '功率(W)', type: 'line', data: realtimeData.map(d=>d.power), smooth: true, symbol: 'none', lineStyle: {color:'#fc5c65',width:2}, areaStyle: {color: new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(252,92,101,0.3)'},{offset:1,color:'rgba(252,92,101,0)'}]) } }],
  });
  charts.t.setOption({
    xAxis: { data: labels },
    series: [{ name: '温度(°C)', type: 'line', data: realtimeData.map(d=>d.temp), smooth: true, symbol: 'none', lineStyle: {color:'#fd9644',width:2}, areaStyle: {color: new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(253,150,68,0.25)'},{offset:1,color:'rgba(253,150,68,0)'}]) } }],
  });
  charts.l.setOption({
    xAxis: { data: labels },
    series: [{ name: '光照(W/m²)', type: 'line', data: realtimeData.map(d=>d.light), smooth: true, symbol: 'none', lineStyle: {color:'#fed330',width:2}, areaStyle: {color: new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(254,211,48,0.25)'},{offset:1,color:'rgba(254,211,48,0)'}]) } }],
  });
}

// ============ MQTT 实时 ============
const mqttClient = mqtt.connect('wss://broker-cn.emqx.io:8084/mqtt', {
  clientId: 'web_dashboard_' + Math.random().toString(16).slice(2,8),
  clean: true,
  reconnectPeriod: 3000,
});

mqttClient.on('connect', () => {
  setStatus(true);
  mqttClient.subscribe('pv_monitor/data');
});

mqttClient.on('message', (t, p) => {
  try {
    const d = JSON.parse(p.toString());
    updateCards(d);
    realtimeData.push({ ...d, timestamp: Date.now() });
    if (realtimeData.length > MAX_POINTS) realtimeData.shift();
    // 节流更新
    if (!updateRealtimeChart._t) {
      updateRealtimeChart._t = setTimeout(() => { updateRealtimeChart(); updateRealtimeChart._t = null; }, 500);
    }
  } catch(e) {}
});

mqttClient.on('reconnect', () => setStatus(false));
mqttClient.on('close', () => setStatus(false));

// ============ 历史数据 ============
async function loadHistory() {
  const hours = document.getElementById('rangeSelect').value;
  try {
    const res = await fetch(`/api/data/history?hours=${hours}&limit=1000`);
    const json = await res.json();
    if (!json.ok) return;
    historyData = json.data;
    document.getElementById('dataInfo').textContent = `共 ${json.count} 条记录`;

    const labels = json.data.map(d => fmtTime(d.timestamp));
    charts.vi.setOption({ xAxis: { data: labels }, series: [
      { name: '电压(V)', type: 'line', data: json.data.map(d=>d.voltage), smooth: true, symbol: 'none', lineStyle: {color:'#f7b731',width:2} },
      { name: '电流(A)', type: 'line', data: json.data.map(d=>d.current), smooth: true, symbol: 'none', lineStyle: {color:'#45aaf2',width:2} },
    ]});
    charts.p.setOption({ xAxis: { data: labels }, series: [
      { name: '功率(W)', type: 'line', data: json.data.map(d=>d.power), smooth: true, symbol: 'none', lineStyle: {color:'#fc5c65',width:2} },
    ]});
    charts.t.setOption({ xAxis: { data: labels }, series: [
      { name: '温度(°C)', type: 'line', data: json.data.map(d=>d.temp), smooth: true, symbol: 'none', lineStyle: {color:'#fd9644',width:2} },
    ]});
    charts.l.setOption({ xAxis: { data: labels }, series: [
      { name: '光照(W/m²)', type: 'line', data: json.data.map(d=>d.light), smooth: true, symbol: 'none', lineStyle: {color:'#fed330',width:2} },
    ]});

    // 加载统计
    const sres = await fetch(`/api/data/stats?hours=${hours}`);
    const sjson = await sres.json();
    if (sjson.ok) showStats(sjson.stats, hours);
  } catch(e) { console.error(e); }
}

function showStats(s, hours) {
  const p = document.getElementById('statsPanel');
  if (!s || s.count === 0) { p.innerHTML = '<div class="stat-card"><div class="slbl">暂无数据</div></div>'; return; }
  p.innerHTML = `
    <div class="stat-card"><div class="sval">${s.count}</div><div class="slbl">数据条数 (${hours}h)</div></div>
    <div class="stat-card"><div class="sval">${s.avg_voltage}V</div><div class="slbl">平均电压</div></div>
    <div class="stat-card"><div class="sval">${s.max_voltage}V</div><div class="slbl">最高电压</div></div>
    <div class="stat-card"><div class="sval">${s.avg_power}W</div><div class="slbl">平均功率</div></div>
    <div class="stat-card"><div class="sval">${s.max_power}W</div><div class="slbl">峰值功率</div></div>
    <div class="stat-card"><div class="sval">${s.energy_wh}Wh</div><div class="slbl">预估发电量</div></div>
    <div class="stat-card"><div class="sval">${s.avg_temp}°C</div><div class="slbl">平均温度</div></div>
    <div class="stat-card"><div class="sval">${s.avg_light}</div><div class="slbl">平均光照 (W/m²)</div></div>
  `;
}

// 导出 CSV
function exportCSV() {
  const hours = document.getElementById('rangeSelect').value;
  window.open(`/api/data/export?hours=${hours}`, '_blank');
}

// 初始加载
loadHistory();
</script>
</body>
</html>
